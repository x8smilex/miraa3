<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Album</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: rgba(255,255,255,0.08);
    --text: #e8e4dd;
    --muted: rgba(232,228,221,0.45);
    --accent: #c9a96e;
    --thumb-size: 88px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── CONFIG OVERLAY ── */
  #config-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  #config-overlay.hidden { display: none; }

  .config-card {
    width: 100%; max-width: 520px;
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    background: var(--surface);
  }
  .config-card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2rem;
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
  }
  .config-card p { color: var(--muted); font-size: 14px; line-height: 1.7; margin-bottom: 1.5rem; }
  .config-card label { display: block; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .config-card input {
    width: 100%; padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  .config-card input:focus { border-color: var(--accent); }
  .config-card input::placeholder { color: rgba(255,255,255,0.2); }
  .btn-primary {
    width: 100%; padding: 12px;
    background: var(--accent);
    color: #0d0d0d;
    border: none; border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.06em;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .hint {
    margin-top: 1.2rem;
    padding: 12px 14px;
    background: rgba(201,169,110,0.08);
    border-left: 2px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px; color: var(--muted); line-height: 1.6;
  }
  .hint code { color: var(--accent); font-size: 12px; background: rgba(201,169,110,0.1); padding: 1px 5px; border-radius: 4px; }

  /* ── MAIN ALBUM ── */
  #album { display: none; flex-direction: column; height: 100vh; }
  #album.visible { display: flex; }

  /* Header */
  .album-header {
    padding: 1.2rem 2rem;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .album-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; letter-spacing: 0.06em; }
  .album-count { font-size: 13px; color: var(--muted); }

  /* Main viewer */
  .viewer-area {
    flex: 1; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    padding: 1rem;
    overflow: hidden;
  }

  .main-img-wrap {
    position: relative;
    max-width: 100%; max-height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  #main-img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    transition: opacity 0.25s ease, transform 0.25s ease;
    cursor: zoom-in;
    display: block;
  }
  #main-img.loading { opacity: 0; }
  #main-img.zoomed { cursor: zoom-out; }

  /* Nav arrows */
  .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    background: rgba(13,13,13,0.7);
    border: 0.5px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: background 0.2s, border-color 0.2s;
    z-index: 10;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
