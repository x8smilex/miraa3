<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Ảnh & Video Lớp MIRA A3</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: rgba(255,255,255,0.06);
    --text: #e8e4dd; --muted: rgba(232,228,221,0.5); --accent: #c9a96e; 
    --accent-dark: #a4844e; --thumb-size: 85px; --danger: #ff4757;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; overflow: hidden; }
  
  #album { display: none; flex-direction: column; height: 100vh; }
  #album.visible { display: flex; }
  
  /* HEADER */
  .album-header { padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); z-index: 10; gap: 15px; }
  .album-title-wrap { display: flex; flex-direction: column; gap: 2px; }
  .album-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 400; letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase; }
  .album-count { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }

  /* NHÓM NÚT TƯƠNG TÁC GÓC TRÊN BÊN PHẢI */
  .action-group { display: flex; gap: 10px; align-items: center; }
  .btn-ui { padding: 8px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 30px; color: var(--text); font-size: 12px; font-weight: 400; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: all 0.3s; user-select: none; }
  .btn-ui:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); }
  
  .like-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(255, 71, 87, 0.05); }
  .like-btn.liked { background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3); }
  .dl-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(201, 169, 110, 0.05); }
  .slideshow-btn:hover { border-color: #2ed573; color: #2ed573; background: rgba(46, 213, 115, 0.05); }
  .slideshow-btn.playing { background: #2ed573; color: #0a0a0a; border-color: #2ed573; box-shadow: 0 4px 12px rgba(46, 213, 115, 0.3); font-weight: 500; }

  /* BỐ CỤC CHÍNH 2 CỘT */
  .main-container { flex: 1; display: flex; min-height: 0; overflow: hidden; }
  
  /* CỘT TRÁI TỐI GIẢN */
  .wishes-column { width: 280px; border-right: 1px solid var(--border); background: #0f0f0f; display: flex; flex-direction: column; padding: 1.2rem; gap: 1.2rem; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .wishes-column h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--accent); font-weight: 400; letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-top: 5px; }
  
  .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 5px 0; }
  
  /* 🌈 CẤU TRÚC AVATAR HIỆU ỨNG 7 SẮC CẦU VỒNG RGB GLOW */
  .avatar-circle { 
    width: 52px; 
    height: 52px; 
    border-radius: 50%; 
    position: relative; 
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  /* Tạo vòng tròn màu gradient nền ẩn phía sau */
  .avatar-circle::before {
    content: '';
    position: absolute;
    inset: -2px; /* Kích thước viền phát sáng */
    border-radius: 50%;
    background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
    background-size: 400%;
    z-index: 1;
    opacity: 0.2; /* Mặc định mờ mờ tinh tế */
    transition: opacity 0.3s ease;
    /* Hiệu ứng chuyển động dải màu mượt mà */
    animation: rainbowShift 20s linear infinite;
  }

  /* Khung chứa ảnh thực tế đè lên trên dải màu nền */
  .avatar-inner {
    position: absolute;
    inset: 1px; /* Tạo khoảng hở cực nhỏ để dải màu lọt qua làm viền */
    border-radius: 50%;
    background: var(--surface);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.03);
  }
  .avatar-inner img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .avatar-inner .avatar-initial { font-size: 15px; color: var(--accent); font-weight: 500; }
  
  /* 🛠️ HIỆU ỨNG DI CHUỘT VÀO: 7 SẮC CẦU VỒNG RỰC SÁNG & BÙNG NỔ HÀO QUANG (GLOW) */
  .avatar-circle:hover { 
    transform: scale(1.15);
    z-index: 5;
  }
  .avatar-circle:hover::before {
    opacity: 1;
    /* Đẩy ánh sáng neon tỏa ra ngoài dạng cầu vồng siêu đẹp */
    filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.6)) 
            drop-shadow(0 0 20px rgba(0, 255, 213, 0.4));
  }

  /* Khởi tạo chuyển động dải màu chạy vô tận */
  @keyframes rainbowShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  
  /* KHU VỰC CHIẾU CHÍNH (CỘT PHẢI) */
  .viewer-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 1.5rem; overflow: hidden; background: #050505; }
  .main-img-wrap { position: relative; width: 100%; height: 100%; max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border-radius: 8px; }
  
  #main-img, #main-video, #main-iframe { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; transition: opacity 0.3s ease; display: none; border: 1px solid rgba(255,255,255,0.03); }
  #main-img.visible, #main-video.visible, #main-iframe.visible { display: block; }
  #main-img.loading { opacity: 0; }
  
  .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; background: rgba(20,20,20,0.5); border: 1px solid var(--border); border-radius: 50%; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 10; backdrop-filter: blur(12px); transition: all 0.3s; }
  .nav-btn:hover { background: var(--accent); color: #0a0a0a; border-color: var(--accent); transform: translateY(-50%) scale(1.05); box-shadow: 0 0 15px rgba(201,169,110,0.4); }
  .nav-btn.prev { left: 1.5rem; } .nav-btn.next { right: 1.5rem; }
  
  .ss-progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0%; transition: width 3s linear; border-radius: 0 0 8px 8px; z-index: 12; }
  .img-counter { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--text); font-weight: 400; background: rgba(20,20,20,0.7); border: 1px solid var(--border); padding: 6px 16px; border-radius: 30px; pointer-events: none; backdrop-filter: blur(12px); letter-spacing: 0.05em; z-index: 11; }
  
  /* THANH TỔNG HỢP: SLIDER KHUNG THUMBNAIL */
  .thumb-slider-wrapper { flex-shrink: 0; display: flex; flex-direction: column; background: var(--surface); border-top: 1px solid var(--border); }
  
  .tabs-container { display: flex; gap: 8px; padding: 10px 20px 0 20px; background: rgba(0,0,0,0.2); overflow-x: auto; scrollbar-width: none; }
  .tabs-container::-webkit-scrollbar { display: none; }
  .tab-btn { background: none; border: none; color: var(--muted); font-family: inherit; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; padding: 6px 14px; cursor: pointer; border-radius: 20px; transition: all 0.3s; display: flex; align-items: center; gap: 6px; border: 1px solid transparent; white-space: nowrap; }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .tab-btn.active { color: var(--accent); background: rgba(201, 169, 110, 0.08); border-color: rgba(201,169,110,0.2); font-weight: 500; }
  .tab-btn.tab-danger.active { color: var(--danger); background: rgba(255, 71, 87, 0.08); border-color: rgba(255, 71, 87, 0.2); }

  .slider-main-row { display: flex; align-items: center; padding: 0 10px; width: 100%; }
  .thumb-nav-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: var(--text); width: 36px; height: 75px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: all 0.3s; z-index: 5; }
  .thumb-nav-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 10px rgba(201,169,110,0.2); }
  
  .thumb-strip { flex: 1; padding: 0.7rem 0.5rem 0.9rem 0.5rem; overflow-x: hidden; display: flex; gap: 10px; align-items: center; scroll-behavior: smooth; white-space: nowrap; min-height: 110px; }
  @media (max-width: 768px) { .thumb-strip { overflow-x: auto; } .thumb-nav-btn { display: none; } }

  .thumb-item { flex-shrink: 0; position: relative; width: var(--thumb-size); height: var(--thumb-size); cursor: pointer; }
  .thumb { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; border: 2px solid transparent; transition: all 0.25s; opacity: 0.35; }
  .thumb-item:hover .thumb { opacity: 0.7; }
  .thumb-item.active .thumb { border-color: var(--accent); opacity: 1; transform: translateY(-4px); box-shadow: 0 4px 12px rgba(201,169,110,0.3); }
  .tab-danger-active.thumb-item.active .thumb { border-color: var(--danger); box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3); }
  
  .video-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 0.5px solid rgba(255,255,255,0.2); z-index: 2; }
  
  .thumb-like-badge { position: absolute; top: -5px; left: 5px; background: var(--danger); color: #fff; font-size: 9px; font-weight: 500; padding: 1px 6px; border-radius: 10px; display: flex; align-items: center; gap: 3px; border: 0.5px solid rgba(255,255,255,0.2); z-index: 2; box-shadow: 0 2px 6px rgba(0,0,0,0.4); animation: popIn 0.3s ease; }
  @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

  /* LOADING SCREEN */
  #loading { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; }
  #loading.hidden { display: none; }
  .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  #error-msg { display: none; position: fixed; inset: 0; z-index: 300; background: var(--bg); align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 2rem; }
  #error-msg.show { display: flex; }

  /* LIGHTBOX PHÓNG TO */
  #lightbox { position: fixed; inset: 0; z-index: 500; background: rgba(5,5,5,0.98); display: none; align-items: center; justify-content: center; cursor: zoom-out; }
  #lightbox.open { display: flex; } #lightbox img { max-width: 96vw; max-height: 96vh; object-fit: contain; box-shadow: 0 10px 50px rgba(0,0,0,0.8); border-radius: 4px; }
  .lb-close { position: fixed; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
  .lb-close:hover { background: var(--danger); border-color: var(--danger); color: #fff; transform: rotate(90deg); }

  @media (max-width: 768px) {
    .album-header { flex-direction: column; align-items: flex-start; padding: 1rem; gap: 10px; }
    .action-group { width: 100%; justify-content: space-between; }
    .btn-ui { padding: 6px 12px; font-size: 11px; flex: 1; justify-content: center; }
    .main-container { flex-direction: column-reverse; }
    .wishes-column { width: 100%; height: 220px; padding: 1rem; border-right: none; border-top: 1px solid var(--border); }
    .avatar-grid { grid-template-columns: repeat(6, 1fr); gap: 10px; }
    .tabs-container { padding: 8px 10px 0 10px; gap: 5px; }
    .tab-btn { font-size: 10px; padding: 4px 12px; }
    .img-counter { top: 1rem; bottom: auto; }
    :root { --thumb-size: 68px; }
    .nav-btn { width: 38px; height: 38px; font-size: 14px; }
    .nav-btn.prev { left: 0.5rem; } .nav-btn.next { right: 0.5rem; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="font-size: 13px; color: var(--muted); letter-spacing: 0.15em;">ĐANG TẢI ALBUM ĐA PHƯƠNG TIỆN...</p>
</div>

<div id="error-msg">
  <h2 style="font-family: 'Cormorant Garamond', serif; font-weight:300; color: var(--accent);">Không thể kết nối</h2>
  <p id="error-detail" style="color: var(--muted); font-size: 14px;">Vui lòng kiểm tra lại cấu hình Web App.</p>
</div>

<div id="album">
  <div class="album-header">
    <div class="album-title-wrap">
      <span class="album-title">KỶ NIỆM CUỐI NĂM - MIRA A3</span>
      <span class="album-count" id="album-count">0 tệp</span>
    </div>
    
    <div class="action-group">
      <button class="btn-ui slideshow-btn" id="slideshow-btn" onclick="toggleSlideshow()"><i class="fa-solid fa-play"></i> Tự Động Chạy</button>
      <button class="btn-ui like-btn" id="like-btn" onclick="likeImage()"><i class="fa-regular fa-heart"></i> Thả Tim (<span id="like-count">0</span>)</button>
      <a id="dl-btn" class="btn-ui dl-btn" target="_blank" rel="noopener"><i class="fa-solid fa-download"></i> Tải Bản Gốc</a>
    </div>
  </div>

  <div class="main-container">
    <div class="wishes-column">
      <h3><i class="fa-solid fa-chalkboard-user"></i> Ban Giám Hiệu & GV</h3>
      <div class="avatar-grid" id="teachers-grid"></div>

      <h3><i class="fa-solid fa-graduation-cap"></i> Thành Viên Lớp (23)</h3>
      <div class="avatar-grid" id="students-grid"></div>
    </div>

    <div class="viewer-area" id="viewer-area">
      <button class="nav-btn prev" onclick="prevImg()"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="main-img-wrap">
        <img id="main-img" src="" alt="Ảnh chính" onclick="openLightbox()" />
        <video id="main-video" controls playsinline src=""></video>
        <iframe id="main-iframe" allow="autoplay; encrypted-media" allowfullscreen="true" style="width: 100%; height: 100%; border: none; border-radius: 8px;"></iframe>
        <div class="ss-progress-bar" id="ss-progress-bar"></div>
      </div>
      <button class="nav-btn next" onclick="nextImg()"><i class="fa-solid fa-chevron-right"></i></button>
      
      <div class="img-counter" id="img-counter"></div>
    </div>
  </div>

  <div class="thumb-slider-wrapper">
    <div class="tabs-container">
      <button class="tab-btn active" id="tab-all" onclick="switchTab('all')"><i class="fa-solid fa-layer-group"></i> Tất cả</button>
      <button class="tab-btn" id="tab-images" onclick="switchTab('images')"><i class="fa-solid fa-image"></i> Hình ảnh</button>
      <button class="tab-btn" id="tab-videos" onclick="switchTab('videos')"><i class="fa-solid fa-video"></i> Video Clip</button>
      <button class="tab-btn tab-danger" id="tab-liked" onclick="switchTab('liked')"><i class="fa-solid fa-heart"></i> Yêu thích nhất ❤️</button>
    </div>
    
    <div class="slider-main-row">
      <button class="thumb-nav-btn" onclick="scrollThumbstrip('left')"><i class="fa-solid fa-angle-left"></i></button>
      <div class="thumb-strip" id="thumb-strip"></div>
      <button class="thumb-nav-btn" onclick="scrollThumbstrip('right')"><i class="fa-solid fa-angle-right"></i></button>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
  <img id="lightbox-img" src="" alt="Xem phóng to" onclick="event.stopPropagation()" />
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1JoIYMhXRxZB60HyIqSrnCzk54F0-ORbVrDSjRetoru6eW0FhmXyWswdIVpb7223l/exec";

  const TEACHERS = [
    { name: "Ms Chinh", img: "https://drive.google.com/thumbnail?sz=w200&id=1PnSVp7XJ0NLG4m-IIqZfvDZ6hhdxFV7C" },
    { name: "Thầy Hiệu Trưởng", img: "" },
    { name: "Cô Phó Hiệu Trưởng", img: "" },
    { name: "Thầy Giám Thị", img: "" },
    { name: "Cô Tiếng Anh", img: "" }
  ];

  const STUDENTS = [
    { name: "An", img: "" }, { name: "Bảo", img: "" }, { name: "Cường", img: "" }, { name: "Dũng", img: "" },
    { name: "Đạt", img: "" }, { name: "Hà", img: "" }, { name: "Hải", img: "" }, { name: "Hoàng", img: "" },
    { name: "Hùng", img: "" }, { name: "Khánh", img: "" }, { name: "Linh", img: "" }, { name: "Long", img: "" },
    { name: "Minh", img: "" }, { name: "Nam", img: "" }, { name: "Nga", img: "" }, { name: "Phong", img: "" },
    { name: "Phúc", img: "" }, { name: "Quân", img: "" }, { name: "Sơn", img: "" }, { name: "Tâm", img: "" },
    { name: "Tuấn", img: "" }, { name: "Vinh", img: "" }, { name: "Yến", img: "" }
  ];

  let masterImages = []; 
  let images = [];       
  let current = 0;
  let currentTab = 'all'; 
  
  let slideshowInterval = null;
  const SLIDESHOW_SPEED = 3000; 

  window.onload = () => {
    renderClassDirectory();
    loadAlbumData();
  };

  function renderClassDirectory() {
    const tGrid = document.getElementById('teachers-grid');
    const sGrid = document.getElementById('students-grid');
    
    tGrid.innerHTML = ''; sGrid.innerHTML = '';

    TEACHERS.forEach(t => tGrid.appendChild(createAvatarElement(t, true)));
    STUDENTS.forEach(s => sGrid.appendChild(createAvatarElement(s, false)));
  }

  // SỬA ĐỔI HÀM KHỞI TẠO ĐỂ ĐƯA LỚP ĐỆM .avatar-inner VÀO PHỤC VỤ HIỆU ỨNG RAINBOW
  function createAvatarElement(person, isTeacher) {
    const circle = document.createElement('div');
    circle.className = 'avatar-circle';
    circle.setAttribute('title', person.name);
    circle.onclick = () => filterByPerson(person.name);

    const inner = document.createElement('div');
    inner.className = 'avatar-inner';

    if (person.img) {
      const img = document.createElement('img');
      img.src = person.img;
      img.alt = person.name;
      inner.appendChild(img);
    } else {
      const initial = document.createElement('span');
      initial.className = 'avatar-initial';
      initial.textContent = person.name.charAt(0).toUpperCase();
      if(isTeacher) initial.style.color = '#fff';
      inner.appendChild(initial);
    }

    circle.appendChild(inner);
    return circle;
  }

  function filterByPerson(name) {
    stopSlideshow();
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    currentTab = 'filter';

    const searchKey = name.toLowerCase();
    images = masterImages.filter(img => (img.name || "").toLowerCase().includes(searchKey));

    const textEl = document.getElementById('album-count');
    textEl.innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> File của: <b>${name}</b> (${images.length})`;
    
    buildThumbs();

    if (images.length > 0) {
      showImage(0);
    } else {
      document.getElementById('main-img').classList.remove('visible');
      document.getElementById('main-video').classList.remove('visible');
      document.getElementById('main-iframe').classList.remove('visible');
      document.getElementById('main-iframe').src = "";
      document.getElementById('thumb-strip').innerHTML = `<div style="color:var(--muted); font-size:13px; padding:20px; width:100%; text-align:center;"><i class="fa-solid fa-face-frown"></i> Chưa có ảnh nào đặt tên theo từ khóa "${name}".</div>`;
      document.getElementById('img-counter').textContent = "0 / 0";
    }
  }

  function loadAlbumData() {
    const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
    
    window[callbackName] = function(data) {
      delete window[callbackName];
      document.body.removeChild(script);

      if (data.error) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-msg').classList.add('show');
        document.getElementById('error-detail').textContent = data.error;
        return;
      }

      masterImages = data.files || [];
      images = [...masterImages]; 
      
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('album').classList.add('visible');
      updateFileCountText();

      buildThumbs();
    };

    const script = document.createElement('script');
    script.src = `${APPS_SCRIPT_URL}?action=getData&callback=${callbackName}`;
    script.onerror = function() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error-msg').classList.add('show');
      document.getElementById('error-detail').textContent = "Lỗi kết nối mạng hoặc link Web App không hợp lệ.";
    };
    document.body.appendChild(script);
  }

  function switchTab(tab) {
    if (currentTab === tab) return;
    currentTab = tab;
    stopSlideshow();

    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    document.getElementById('tab-images').classList.toggle('active', tab === 'images');
    document.getElementById('tab-videos').classList.toggle('active', tab === 'videos');
    document.getElementById('tab-liked').classList.toggle('active', tab === 'liked');

    if (tab === 'all') {
      images = [...masterImages];
    } else if (tab === 'images') {
      images = masterImages.filter(item => {
        const name = (item.name || "").toLowerCase();
        return !item.isVideo && !name.endsWith('.mp4') && !name.endsWith('.mov') && !name.endsWith('.mkv') && !name.endsWith('.avi');
      });
    } else if (tab === 'videos') {
      images = masterImages.filter(item => {
        const name = (item.name || "").toLowerCase();
        return item.isVideo || name.endsWith('.mp4') || name.endsWith('.mov') || name.endsWith('.mkv') || name.endsWith('.avi');
      });
    } else if (tab === 'liked') {
      images = masterImages
        .filter(item => (item.likes || 0) > 0)
        .sort((a, b) => (b.likes || 0) - (a.likes || 0));
    }

    updateFileCountText();
    buildThumbs();

    if (images.length > 0) {
      showImage(0);
    } else {
      document.getElementById('main-img').classList.remove('visible');
      document.getElementById('main-video').classList.remove('visible');
      document.getElementById('main-iframe').classList.remove('visible');
      document.getElementById('main-iframe').src = "";
      
      let emptyMsg = '<i class="fa-regular fa-folder-open"></i> Mục này hiện đang trống.';
      if(tab === 'liked') emptyMsg = '<i class="fa-regular fa-heart"></i> Chưa có ảnh/video nào được thả tim.';
      
      document.getElementById('thumb-strip').innerHTML = `<div style="color:var(--muted); font-size:13px; padding:20px; width:100%; text-align:center;">${emptyMsg}</div>`;
      document.getElementById('img-counter').textContent = "0 / 0";
      document.getElementById('like-count').textContent = "0";
    }
  }

  function updateFileCountText() {
    const textEl = document.getElementById('album-count');
    if (currentTab === 'all') textEl.textContent = images.length + ' tệp';
    else if (currentTab === 'images') textEl.textContent = images.length + ' hình ảnh';
    else if (currentTab === 'videos') textEl.textContent = images.length + ' video clip';
    else if (currentTab === 'liked') textEl.textContent = images.length + ' khoảnh khắc yêu thích';
  }

  function buildThumbs() {
    const strip = document.getElementById('thumb-strip');
    strip.innerHTML = '';
    
    images.forEach((img, i) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'thumb-item';
      if (currentTab === 'liked') wrapper.classList.add('tab-danger-active');
      wrapper.dataset.idx = i;
      wrapper.onclick = () => { stopSlideshow(); showImage(i); };
      
      const el = document.createElement('img');
      el.className = 'thumb';
      el.src = img.thumbnailLink;
      el.alt = img.name;
      el.loading = 'lazy';
      wrapper.appendChild(el);
      
      const fileName = (img.name || "").toLowerCase();
      const isVideo = img.isVideo || fileName.endsWith('.mp4') || fileName.endsWith('.mov') || fileName.endsWith('.mkv') || fileName.endsWith('.avi');
      
      if (isVideo) {
        const badge = document.createElement('div');
        badge.className = 'video-badge';
        badge.innerHTML = '<i class="fa-solid fa-play"></i>';
        wrapper.appendChild(badge);
      }
      
      if ((img.likes || 0) > 0) {
        const likeBadge = document.createElement('div');
        likeBadge.className = 'thumb-like-badge';
        likeBadge.innerHTML = `<i class="fa-solid fa-heart"></i> ${img.likes}`;
        wrapper.appendChild(likeBadge);
      }
      
      strip.appendChild(wrapper);
    });
  }

  function scrollThumbstrip(direction) {
    const strip = document.getElementById('thumb-strip');
    const scrollAmount = strip.clientWidth * 0.8; 
    if (direction === 'left') { strip.scrollLeft -= scrollAmount; } else { strip.scrollLeft += scrollAmount; }
  }

  function showImage(idx) {
    if(!images.length) return;
    current = idx;
    const item = images[idx];
    
    const mainImg = document.getElementById('main-img');
    const mainVideo = document.getElementById('main-video');
    const mainIframe = document.getElementById('main-iframe');
    
    mainVideo.pause();
    mainVideo.src = "";
    mainIframe.src = "";

    const fileName = (item.name || "").toLowerCase();
    const isVideoFile = item.isVideo || 
                        fileName.endsWith('.mp4') || 
                        fileName.endsWith('.mov') || 
                        fileName.endsWith('.mkv') || 
                        fileName.endsWith('.avi');

    if (isVideoFile) {
      mainImg.classList.remove('visible');
      mainVideo.classList.remove('visible'); 
      mainIframe.classList.add('visible');
      mainIframe.src = "https://drive.google.com/file/d/" + item.id + "/preview";
      if (slideshowInterval) stopSlideshow();
    } else {
      mainIframe.classList.remove('visible');
      mainVideo.classList.remove('visible');
      mainImg.classList.add('visible');
      
      const displayUrl = item.thumbnailLink.replace('sz=w220', 'sz=w1600');
      mainImg.classList.add('loading');
      mainImg.src = displayUrl;
      mainImg.onload = () => {
        mainImg.classList.remove('loading');
        if (slideshowInterval) resetProgressBar();
      };
      document.getElementById('lightbox-img').src = displayUrl;
    }

    document.getElementById('dl-btn').href = item.webContentLink;
    document.getElementById('img-counter').innerHTML = `<i class="fa-regular fa-images"></i> ${idx + 1} / ${images.length}`;
    document.getElementById('like-count').textContent = item.likes || 0;

    const likedList = JSON.parse(localStorage.getItem('mira_liked') || '[]');
    const likeBtn = document.getElementById('like-btn');
    if (likedList.includes(item.id)) {
      likeBtn.classList.add('liked');
      likeBtn.innerHTML = `<i class="fa-solid fa-heart"></i> Đã Thả Tim (<span id="like-count">${item.likes}</span>)`;
    } else {
      likeBtn.classList.remove('liked');
      likeBtn.innerHTML = `<i class="fa-regular fa-heart"></i> Thả Tim (<span id="like-count">${item.likes}</span>)`;
    }

    document.querySelectorAll('.thumb-item').forEach((t, i) => t.classList.toggle('active', i === idx));
    const activeThumb = document.querySelector(`.thumb-item[data-idx="${idx}"]`);
    if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  function toggleSlideshow() {
    const btn = document.getElementById('slideshow-btn');
    if (slideshowInterval) {
      stopSlideshow();
    } else {
      const fileName = (images[current] ? images[current].name || "" : "").toLowerCase();
      const isVideo = images[current] && (images[current].isVideo || fileName.endsWith('.mp4') || fileName.endsWith('.mov'));
      if (isVideo) {
        alert("Không thể bật Tự động chạy khi đang xem Video.");
        return;
      }
      btn.classList.add('playing');
      btn.innerHTML = `<i class="fa-solid fa-pause"></i> Dừng Chạy`;
      resetProgressBar();
      slideshowInterval = setInterval(() => { nextImg(); }, SLIDESHOW_SPEED);
    }
  }

  function stopSlideshow() {
    const btn = document.getElementById('slideshow-btn');
    if (slideshowInterval) { clearInterval(slideshowInterval); slideshowInterval = null; }
    btn.classList.remove('playing');
    btn.innerHTML = `<i class="fa-solid fa-play"></i> Tự Động Chạy`;
    document.getElementById('ss-progress-bar').style.transition = 'none';
    document.getElementById('ss-progress-bar').style.width = '0%';
  }

  function resetProgressBar() {
    const bar = document.getElementById('ss-progress-bar');
    bar.style.transition = 'none'; bar.style.width = '0%';
    setTimeout(() => {
      bar.style.transition = `width ${SLIDESHOW_SPEED}ms linear`;
      bar.style.width = '100%';
    }, 20);
  }

  async function likeImage() {
    if (!images.length) return;
    const img = images[current];
    const likedList = JSON.parse(localStorage.getItem('mira_liked') || '[]');
    if (likedList.includes(img.id)) return;

    img.likes = (img.likes || 0) + 1;
    document.getElementById('like-count').textContent = img.likes;
    
    const masterMatch = masterImages.find(m => m.id === img.id);
    if (masterMatch) masterMatch.likes = img.likes;

    const likeBtn = document.getElementById('like-btn');
    likeBtn.classList.add('liked');
    likeBtn.innerHTML = `<i class="fa-solid fa-heart"></i> Đã Thả Tim (<span id="like-count">${img.likes}</span>)`;
    
    likedList.push(img.id);
    localStorage.setItem('mira_liked', JSON.stringify(likedList));
    
    buildThumbs();

    if (currentTab === 'liked') {
      images = masterImages
        .filter(item => (item.likes || 0) > 0)
        .sort((a, b) => (b.likes || 0) - (a.likes || 0));
      updateFileCountText();
      buildThumbs();
      const newIdx = images.findIndex(item => item.id === img.id);
      if (newIdx !== -1) {
        current = newIdx;
        document.querySelectorAll('.thumb-item').forEach((t, i) => t.classList.toggle('active', i === current));
        document.getElementById('img-counter').innerHTML = `<i class="fa-regular fa-images"></i> ${current + 1} / ${images.length}`;
      }
    }

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'like', imageId: img.id })
    });
  }

  function prevImg() { if (images.length) showImage((current - 1 + images.length) % images.length); }
  function nextImg() { if (images.length) showImage((current + 1) % images.length); }
  function openLightbox() { 
    const fileName = (images[current] ? images[current].name || "" : "").toLowerCase();
    const isVideo = images[current] && (images[current].isVideo || fileName.endsWith('.mp4') || fileName.endsWith('.mov') || fileName.endsWith('.mkv') || fileName.endsWith('.avi'));
    if (isVideo) return; 
    stopSlideshow(); 
    document.getElementById('lightbox').classList.add('open'); 
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
  function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') stopSlideshow();
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImg();
      if (e.key === 'ArrowRight') nextImg();
      return;
    }
    if (e.key === 'ArrowLeft') prevImg();
    if (e.key === 'ArrowRight') nextImg();
  });

  let touchStartX = 0;
  const viewer = document.getElementById('viewer-area');
  viewer && viewer.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  viewer && viewer.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) { stopSlideshow(); dx < 0 ? nextImg() : prevImg(); }
  }, { passive: true });
</script>
</body>
</html>
